type Query {
  events: [Event!]!
  event(id: ID!): Event
}

type Event {
  id: ID!
  name: String!
  feedback: [Feedback!]!
}

type Feedback {
  id: ID!
  eventId: ID!
  userName: String!
  rating: Int!
  description: String!
}

query GetEvents {
  events {
    id
    name
  }
}

query GetEvent($id: ID!) {
  event(id: $id) {
    id
    name
    feedback {
      id
      userName
      rating
      description
    }
  }
}
