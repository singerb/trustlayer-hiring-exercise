type Query {
  events: [Event!]!
  event(id: ID!): Event
}

type Mutation {
  addFeedback(eventId: ID!, userName: String!, rating: Int!, description: String!): Feedback!
}

type Subscription {
  feedbackAdded(eventId: ID!): Feedback!
}

type Event {
  id: ID!
  name: String!
  feedback: [Feedback!]!
  averageRating: Float
  reviewCount: Int!
}

type Feedback {
  id: ID!
  eventId: ID!
  userName: String!
  rating: Int!
  description: String!
}

query GetEvents {
  events {
    id
    name
    averageRating
    reviewCount
  }
}

query GetEvent($id: ID!) {
  event(id: $id) {
    id
    name
    feedback {
      id
      userName
      rating
      description
    }
  }
}

mutation AddFeedback($eventId: ID!, $userName: String!, $rating: Int!, $description: String!) {
  addFeedback(eventId: $eventId, userName: $userName, rating: $rating, description: $description) {
    id
    eventId
    userName
    rating
    description
  }
}

subscription FeedbackAdded($eventId: ID!) {
  feedbackAdded(eventId: $eventId) {
    id
    userName
    rating
    description
  }
}
